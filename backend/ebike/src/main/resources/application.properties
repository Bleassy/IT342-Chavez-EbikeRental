spring.application.name=ebike
# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/ebike_rental_db
spring.datasource.username=root
spring.datasource.password=chavez01
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# JWT Configuration
jwt.secret=ebike_rental_system_secure_key_2024_very_long_secret_key_for_production_environment
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.ebike=DEBUG

# Google OAuth2 Configuration (set via environment variables)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email