paymongo.secret.key=${PAYMONGO_SECRET_KEY:}
paymongo.public.key=${PAYMONGO_PUBLIC_KEY:}
paymongo.api.url=${PAYMONGO_API_URL:https://api.paymongo.com/v1}
app.callback.url=${APP_CALLBACK_URL:http://localhost:5173}

