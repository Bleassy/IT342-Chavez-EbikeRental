spring.application.name=ebike
# Active profile defaults to prod (Neon PostgreSQL)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}

# MySQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ebike_rental_db?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/api

# Allow large request bodies for base64 image uploads
server.tomcat.max-http-form-parameter-size=50MB
server.tomcat.max-swallow-size=50MB
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
spring.codec.max-in-memory-size=50MB

# JWT Configuration
jwt.secret=${JWT_SECRET:ebike_rental_system_secure_key_2024_very_long_secret_key_for_production_environment}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Logging
logging.level.root=INFO
logging.level.com.ebike=DEBUG

# Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:868871618431-t2dk1r46f8lucjlco9buupl1mdecagv3.apps.googleusercontent.com}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET: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}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Admin Bootstrap Configuration
admin.bootstrap.email=${ADMIN_BOOTSTRAP_EMAIL:admin@ebike.com}
admin.bootstrap.password=${ADMIN_BOOTSTRAP_PASSWORD:admin123}

# PayMongo GCash Configuration
