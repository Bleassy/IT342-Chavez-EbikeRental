spring.application.name=ebikerental

# ─────────────────────────────────────────────
# MySQL Database – change password to your own
# ─────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/ebikerental_db
spring.datasource.username=root
spring.datasource.password=chavez01
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─────────────────────────────────────────────
# JPA / Hibernate
